#
# JARVIS AI-OS — seL4 x86-64 GRUB Configuration
#
# Boot the seL4 kernel with JARVIS rootserver as initial module.
#
# seL4 x86-64 supports both multiboot1 (BIOS/Legacy) and multiboot2 (UEFI).
# This config provides entries for both boot modes.
#
# Image names from seL4 build system (DeclareRootserver(jarvis-x86)):
#   kernel-x86_64-pc99              — seL4 microkernel
#   sel4test-driver-image-x86_64-pc99   — JARVIS rootserver (ELF + CPIO)
#
# Serial console: COM1 (0x3F8) at 115200 baud, mirrored to VGA.
#

# --- Serial console ---
serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input serial console
terminal_output serial console

set timeout=5
set default=0

# --- BIOS/Legacy boot (multiboot1) ---
menuentry "JARVIS seL4 x86-64" {
    echo 'Loading seL4 kernel...'
    multiboot /boot/kernel-x86_64-pc99
    echo 'Loading JARVIS rootserver...'
    module /boot/sel4test-driver-image-x86_64-pc99
    boot
}

# --- UEFI boot (multiboot2) ---
menuentry "JARVIS seL4 x86-64 (UEFI)" {
    insmod efi_gop
    insmod efi_uga
    insmod all_video
    echo 'Loading seL4 kernel (multiboot2)...'
    multiboot2 /boot/kernel-x86_64-pc99
    echo 'Loading JARVIS rootserver...'
    module2 /boot/sel4test-driver-image-x86_64-pc99
    boot
}

# --- Serial-only mode (no VGA, quiet kernel) ---
menuentry "JARVIS seL4 x86-64 (Serial Only)" {
    echo 'Loading seL4 kernel (serial debug)...'
    multiboot /boot/kernel-x86_64-pc99
    module /boot/sel4test-driver-image-x86_64-pc99
    boot
}
