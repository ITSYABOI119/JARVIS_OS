document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\" data-theme=\"dark\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>JARVIS AI-OS — Framebuffer HUD audit &amp; design (Phase 4 / goal #2)<\u002Ftitle>\n<style>\n  :root{\n    /* code-true panel palette — main_x86.c:1212–1223 */\n    --bg:#0A0B0E; --fg:#C8D0E0; --accent:#4F7CFF; --ok:#3FB950; --err:#F2564B;\n    /* token extensions — JARVIS_OS_DESIGN_TOKENS.md */\n    --warn:#D6A02A; --live:#46C7C7; --muted:#6B7589; --text2:#98A2B6;\n    --card:#12151B; --hover:#1D222C; --line:#272D39; --hairline:#1B1F27;\n    --page:#070809;\n  }\n  *{box-sizing:border-box;}\n  html,body{margin:0;background:var(--page);color:var(--fg);\n    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;\n    -webkit-font-smoothing:antialiased;}\n  .wrap{max-width:1120px;margin:0 auto;padding:40px 24px 96px;}\n  h1{font-size:24px;letter-spacing:-0.01em;color:#E8ECF3;margin:0 0 6px;font-weight:600;}\n  h2{font-size:13px;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent);\n     margin:48px 0 14px;font-weight:600;}\n  h3{font-size:13px;color:#E8ECF3;margin:22px 0 8px;font-weight:600;letter-spacing:0.02em;}\n  p,li{font-size:13px;line-height:1.6;color:var(--text2);}\n  .lead{color:var(--fg);}\n  a{color:var(--accent);text-decoration:none;}\n  code{color:#cdd6e6;background:#12151b;border:1px solid var(--hairline);\n    border-radius:4px;padding:1px 5px;font-size:12px;}\n  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--muted);margin-bottom:10px;}\n  .rule{height:1px;background:var(--line);margin:8px 0 0;}\n\n  /* honesty banner */\n  .honesty{border:1px solid #3a2a1f;background:#14100b;border-radius:8px;padding:14px 16px;margin:20px 0;}\n  .honesty .t{color:var(--warn);font-size:11px;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:8px;}\n  .honesty ul{margin:0;padding-left:18px;} .honesty li{color:#cdb89a;}\n\n  /* tabs */\n  .tabs{display:flex;gap:4px;flex-wrap:wrap;margin:18px 0 16px;border-bottom:1px solid var(--line);padding-bottom:14px;}\n  .tab{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:6px;cursor:pointer;\n    background:transparent;border:1px solid transparent;color:var(--muted);font-size:12px;letter-spacing:0.02em;}\n  .tab:hover{background:var(--hover);color:var(--fg);}\n  .tab.on{background:#12161e;border-color:var(--line);color:#E8ECF3;}\n  .tab .n{font-size:10px;color:var(--muted);}\n  .tab.on .n{color:var(--accent);}\n\n  /* framebuffer frame: authored at 1024×768, scaled to fit */\n  .stage{display:flex;justify-content:center;}\n  .scaler{width:1024px;transform-origin:top center;}\n  .fbwrap{position:relative;width:1024px;height:768px;background:var(--bg);\n    border:1px solid var(--line);overflow:hidden;}\n  .bezelnote{display:flex;justify-content:space-between;align-items:baseline;\n    font-size:11px;color:var(--muted);margin:0 2px 8px;letter-spacing:0.04em;}\n  /* a rendered glyph line. left/top set by JS = col*8 / row*16 */\n  .ln{position:absolute;white-space:pre;font-size:13px;line-height:16px;letter-spacing:0;}\n  .px{position:absolute;}\n  /* aspirational marker */\n  .asp{position:absolute;border:1px dashed var(--warn);border-radius:2px;pointer-events:none;}\n  .asptag{position:absolute;background:var(--warn);color:#1a1206;font-size:9px;\n    padding:1px 4px;border-radius:2px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;}\n  .blink{animation:bl 1s steps(1) infinite;}\n  @keyframes bl{50%{opacity:0;}}\n\n  .cap{margin:16px auto 0;max-width:1024px;}\n  .cap h3{margin-top:0;}\n  .legend{display:flex;gap:18px;flex-wrap:wrap;margin:12px 0 0;}\n  .legend span{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);}\n  .dot{width:9px;height:9px;border-radius:9px;display:inline-block;}\n  .fieldlist{margin:12px 0 0;border:1px solid var(--hairline);border-radius:8px;overflow:hidden;}\n  .fieldlist .row{display:grid;grid-template-columns:170px 1fr 96px;gap:12px;padding:8px 12px;\n    border-top:1px solid var(--hairline);align-items:baseline;}\n  .fieldlist .row:first-child{border-top:none;background:#0d1014;}\n  .fieldlist .k{color:#cdd6e6;font-size:12px;}\n  .fieldlist .v{color:var(--muted);font-size:11.5px;line-height:1.5;}\n  .badge{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;\n    padding:2px 6px;border-radius:3px;text-align:center;white-space:nowrap;align-self:start;}\n  .b-live{background:rgba(63,185,80,0.14);color:var(--ok);}\n  .b-asp{background:rgba(214,160,42,0.14);color:var(--warn);}\n  .b-new{background:rgba(79,124,255,0.14);color:var(--accent);}\n\n  /* tables */\n  table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;}\n  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--hairline);vertical-align:top;line-height:1.5;}\n  th{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;\n    border-bottom:1px solid var(--line);position:sticky;}\n  td{color:var(--text2);}\n  td code{font-size:11px;white-space:nowrap;}\n  .cite{color:var(--accent);font-size:11px;white-space:nowrap;}\n  .tg{font-weight:700;font-size:10px;letter-spacing:0.06em;}\n  .tg.live{color:var(--ok);} .tg.asp{color:var(--warn);} .tg.new{color:var(--accent);}\n  .two{display:grid;grid-template-columns:1fr 1fr;gap:20px;}\n  @media(max-width:820px){.two{grid-template-columns:1fr;} .scaler{transform:scale(0.86);}}\n  .swatch{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}\n  .sw{display:flex;align-items:center;gap:10px;border:1px solid var(--hairline);border-radius:6px;padding:8px 10px;}\n  .sw .chip{width:22px;height:22px;border-radius:4px;border:1px solid rgba(255,255,255,0.08);flex:none;}\n  .sw .nm{font-size:11px;color:#cdd6e6;} .sw .hx{font-size:10.5px;color:var(--muted);}\n  ul.tight{margin:6px 0;padding-left:18px;} ul.tight li{margin:3px 0;}\n  .foot{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:11px;line-height:1.7;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n  <div class=\"eyebrow\">JARVIS AI-OS · Phase 4 / goal #2 · bare-metal framebuffer<\u002Fdiv>\n  <h1>Framebuffer HUD — coverage audit &amp; completed design<\u002Fh1>\n  <p class=\"lead\">A code-derived audit of the on-screen UI for JARVIS AI-OS's 1024×768 GOP framebuffer. Every data point is tagged <span class=\"tg live\">LIVE<\u002Fspan> (the running build produces it today — cited <code>file:line<\u002Fcode>) or <span class=\"tg asp\">ASPIRATIONAL<\u002Fspan> (needs new plumbing). Truth is taken from the source, not from the prior mockups or the BRIEF. Rendered on the real constraint: one 8×16 mono bitmap font → <strong>128 cols × 48 rows<\u002Fstrong>, 32bpp BGRX, native primitives only (filled rects, 1px lines, bitmap text, proportional bars).<\u002Fp>\n\n  <div class=\"honesty\">\n    <div class=\"t\">Honesty stances enforced in every screen<\u002Fdiv>\n    <ul>\n      <li>Never <em>\"formally verified\"<\u002Fem> — the running perf config is outside seL4's verified set (ADR; <code>PHASE_4_GOAL2_DISPLAY.md §6<\u002Fcode>).<\u002Fli>\n      <li>SHIELD = <strong>monitoring / passive<\u002Fstrong>. The live runtime path just returns ALLOW (<code>inference_server.c:668–671<\u002Fcode>); never \"100% blocked\".<\u002Fli>\n      <li>tok/s ≈ <strong>1.5<\u002Fstrong> (single-thread) / <strong>~5.5<\u002Fstrong> (M3 multi-core, CPU-only) — never GPU numbers (<code>jarvis_debug.h:39–42<\u002Fcode>).<\u002Fli>\n      <li>No emoji. Status = a colored <strong>●<\u002Fstrong> + UPPERCASE badges. The only motion is an in-place blinking cursor / a value updating (UC framebuffer → no scroll, no per-token animation).<\u002Fli>\n      <li>The query stream is a <strong>synthetic xorshift workload<\u002Fstrong> (70/15/10/5 cache/infer/hb/shield), not live user input (<code>main_x86.c:1993–2012<\u002Fcode>).<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <h2>Per-state mockups — 1024×768 · 128×48 grid<\u002Fh2>\n  <p>Five operating states. Each frame is authored at true 1024×768 and scaled to fit. Solid fills + 1px lines + bitmap text only; <span style=\"color:var(--warn)\">amber-dashed<\u002Fspan> boxes mark <strong>aspirational<\u002Fstrong> widgets, each with a ships-now fallback in the caption.<\u002Fp>\n\n  <div class=\"tabs\" id=\"tabs\"><\u002Fdiv>\n  <div class=\"stage\"><div class=\"scaler\" id=\"scaler\"><div class=\"fbwrap\" id=\"fb\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"cap\" id=\"cap\"><\u002Fdiv>\n\n  <!-- ============ COVERAGE MATRIX A ============ -->\n  <h2>Coverage matrix A — every LIVE data point → where it lands<\u002Fh2>\n  <p>Direction 1: each thing the running OS produces today, and the state(s) it appears in. Zero silent omissions.<\u002Fp>\n  <table>\n    <thead><tr><th>Live data point<\u002Fth><th>Source<\u002Fth><th>Appears in<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody id=\"matA\"><\u002Ftbody>\n  <\u002Ftable>\n\n  <!-- ============ COVERAGE MATRIX B ============ -->\n  <h2>Coverage matrix B — every on-screen element → its backing<\u002Fh2>\n  <p>Direction 2: each element in the completed design, and the code behind it — or the plumbing it would need.<\u002Fp>\n  <table>\n    <thead><tr><th>On-screen element<\u002Fth><th>Tag<\u002Fth><th>Backing / needs<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody id=\"matB\"><\u002Ftbody>\n  <\u002Ftable>\n\n  <!-- ============ TOKENS ============ -->\n  <h2>Design tokens — framebuffer port<\u002Fh2>\n  <p>Extends <code>JARVIS_OS_DESIGN_TOKENS.md<\u002Fcode>, reconciled to the <strong>shipped code<\u002Fstrong> (palette is the exact <code>FBP_*<\u002Fcode> constants in <code>main_x86.c:1212–1223<\u002Fcode>) and to <strong>1024×768<\u002Fstrong> (the BRIEF/tokens said 1280×720; the box's real GOP mode is 1024×768 — <code>PHASE_4_GOAL2_DISPLAY.md<\u002Fcode> 2c-1). Shipped as a companion C header <code>framebuffer/jarvis_ui_tokens.h<\u002Fcode> — centralizes the live <code>FBP_*<\u002Fcode> names (so <code>main_x86.c<\u002Fcode> can <code>#include<\u002Fcode> it instead of redefining), the <code>JCLR_*<\u002Fcode> ramp, and field <code>(col,row)<\u002Fcode> positions, each tagged live-used vs aspirational-only.<\u002Fp>\n  <div class=\"two\">\n    <div>\n      <h3>Palette — <code>0x00RRGGBB<\u002Fcode> C constants<\u002Fh3>\n      <div class=\"swatch\" id=\"pal\"><\u002Fdiv>\n      <p style=\"margin-top:10px\">No alpha on the framebuffer. Status \"tints\" precompute to a solid hex over <code>FBP_BG<\u002Fcode> — e.g. a card surface = <code>0x12151B<\u002Fcode>. Hairline dividers are 1px <code>fb_fill_rect<\u002Fcode> in <code>0x272D39<\u002Fcode>, not shadows.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h3>Geometry — 8×16 cell grid<\u002Fh3>\n      <table style=\"margin-top:0\">\n        <thead><tr><th>Metric<\u002Fth><th>Value<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Resolution<\u002Ftd><td><code>1024×768×32<\u002Fcode> BGRX @ <code>0xE0000000<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Cell / font<\u002Ftd><td><code>8×16<\u002Fcode> mono bitmap (<code>FB_FONT_W/H<\u002Fcode>)<\u002Ftd><\u002Ftr>\n          <tr><td>Grid<\u002Ftd><td><strong>128 cols × 48 rows<\u002Fstrong><\u002Ftd><\u002Ftr>\n          <tr><td>Cell→px<\u002Ftd><td><code>x = col×8 · y = row×16<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Left margin<\u002Ftd><td><code>FBP_X = 16px<\u002Fcode> (col 2)<\u002Ftd><\u002Ftr>\n          <tr><td>Heading 2× option<\u002Ftd><td><code>16×32<\u002Fcode> → 64 cols × 24 rows (call out per-use)<\u002Ftd><\u002Ftr>\n          <tr><td>Shipped field rows<\u002Ftd><td>title y16 · display y48 · model y72 · threads y96 · queries y120 · last y144<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <p style=\"margin-top:10px\">Positions in the shipped panel are not all on the 16px grid (24px field pitch from y48). The completed 2c-2 layout below snaps everything to whole 16px rows.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SHIPS NOW vs ASPIRATIONAL ============ -->\n  <h2>Ships now vs aspirational<\u002Fh2>\n  <div class=\"two\">\n    <div>\n      <h3 style=\"color:var(--ok)\">Ships now — native + live-backed<\u002Fh3>\n      <ul class=\"tight\" id=\"ship\"><\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <h3 style=\"color:var(--warn)\">Aspirational — needs plumbing<\u002Fh3>\n      <ul class=\"tight\" id=\"aspl\"><\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ GAP REPORT ============ -->\n  <h2>Gap report — prior mockups vs the code<\u002Fh2>\n  <h3>What the prior mockups / BRIEF showed with no live backing<\u002Fh3>\n  <table>\n    <thead><tr><th>Shown<\u002Fth><th>Reality in code<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody id=\"gapA\"><\u002Ftbody>\n  <\u002Ftable>\n  <h3>What the code produces that the mockups missed<\u002Fh3>\n  <table>\n    <thead><tr><th>Real data, not placed by prior mockups<\u002Fth><th>Source<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody id=\"gapB\"><\u002Ftbody>\n  <\u002Ftable>\n  <h3>Reconciliations<\u002Fh3>\n  <ul class=\"tight\">\n    <li><strong>Resolution:<\u002Fstrong> BRIEF/tokens said <code>1280×720<\u002Fcode>; the box's real GOP mode is <code>1024×768<\u002Fcode> (128×48, not 160×45). All geometry here is 1024×768.<\u002Fli>\n    <li><strong>Accent:<\u002Fstrong> BRIEF proposed arc-reactor cyan <code>#22d3ee<\u002Fcode>; the <em>shipped<\u002Fem> code uses electric blue <code>#4F7CFF<\u002Fcode> (<code>FBP_ACCENT<\u002Fcode>). Code wins — cyan is reassigned to the <code>live<\u002Fcode> stream role only.<\u002Fli>\n    <li><strong>Text primary:<\u002Fstrong> tokens said <code>#E8ECF3<\u002Fcode>; shipped <code>FBP_FG = 0xC8D0E0<\u002Fcode>. Code wins.<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"foot\">\n    Sources read (ground truth): <code>phase3/src/sel4/main_x86.c<\u002Fcode> · <code>phase3/src/sel4/inference_server.c<\u002Fcode> · <code>phase3/src/drivers/framebuffer.{c,h}<\u002Fcode> · <code>phase3/src/ipc/shmem_ipc.h<\u002Fcode> · <code>phase3/src/drivers/nvme_log.h<\u002Fcode> · <code>phase1/src/cache/decision_cache.h<\u002Fcode> · <code>phase3/src/sel4/jarvis_debug.h<\u002Fcode> · <code>phase4/docs/PHASE_4_GOAL2_DISPLAY.md<\u002Fcode> · <code>phase4/docs/ui_mockups/{BRIEF,JARVIS_OS_DESIGN_TOKENS}.md<\u002Fcode>.<br>\n    Method: the inventory was derived from the code first; every element is placed and tagged before styling. Numbers marked <em>illustrative<\u002Fem> are emitted live by the cited line but their runtime value was not in the logs read.\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ---- palette (code-true) ---- */\nconst C={bg:'#0A0B0E',fg:'#C8D0E0',accent:'#4F7CFF',ok:'#3FB950',err:'#F2564B',\n  warn:'#D6A02A',live:'#46C7C7',muted:'#6B7589',text2:'#98A2B6',card:'#12151B',line:'#272D39'};\nconst CELLW=8, CELLH=16;\n\n/* helper builders for a frame: returns array of DOM-ready specs */\nfunction T(col,row,text,color){return {t:'ln',x:col*CELLW,y:row*CELLH,text,color:color||C.fg};}\nfunction R(x,y,w,h,fill,border){return {t:'px',x,y,w,h,fill,border};}     /* px coords */\nfunction CR(col,row,wc,hr,fill,border){return {t:'px',x:col*CELLW,y:row*CELLH,w:wc*CELLW,h:hr*CELLH,fill,border};}\nfunction ASP(col,row,wc,hr,tag){return {t:'asp',x:col*CELLW,y:row*CELLH,w:wc*CELLW,h:hr*CELLH,tag};}\nfunction BAR(col,row,wc,pct,fill){ /* proportional rect progress bar, 1 row tall inset */\n  const x=col*CELLW,y=row*CELLH+3,w=wc*CELLW,h=10;\n  return [ {t:'px',x,y,w,h,fill:'#161A22',border:C.line},\n           {t:'px',x:x+1,y:y+1,w:Math.max(0,Math.round((w-2)*pct)),h:h-2,fill} ]; }\n\n/* ===== shared chrome for the completed 2c-2 layout ===== */\nfunction chrome(stateRight, rightColor){\n  let a=[];\n  /* header band */\n  a.push(CR(0,0,128,2,'#0C0E12',null));\n  a.push(T(2,0,'JARVIS AI-OS',C.accent));\n  a.push(T(15,0,'· seL4 · Ring 0 · CPU-only',C.muted));\n  a.push(T(108,0,'●',rightColor));\n  a.push(T(110,0,stateRight,rightColor));\n  a.push(R(0,32,1024,1,C.line,null));          /* hairline under header */\n  /* left status block label */\n  a.push(T(2,2,'SYSTEM',C.muted));\n  a.push(R(16,48+ -2,1,1,'transparent',null));\n  return a;\n}\n/* status fields (left column), whole-row grid */\nfunction statusFields(modelStr, modelColor, qStr, qColor, lastStr){\n  return [\n    T(2,4,'Display : 1024x768x32  @0xe0000000  BGRX',C.fg),\n    T(2,5,'Model   : '+modelStr,modelColor),\n    T(2,6,'Threads : NUM_NODES=6  (M3 worker pool)',C.fg),\n    T(2,7,'Self-test 5/5 PASS',C.ok),\n    T(2,11,'Queries : '+qStr,qColor),\n    T(2,12,'Last    : '+lastStr,C.fg),\n  ];\n}\n/* event-log region box (the 2c-2 scrolling log) */\nfunction logBox(title, lines){\n  let a=[];\n  a.push(R(16, 14*16, 1024-32, 26*16, '#0B0D11', C.line));\n  a.push(T(2,13,'EVENT LOG',C.muted));\n  a.push(T(110,13,'[nvme_log]',C.muted));\n  lines.forEach((ln,i)=>{ a.push(T(3, 15+i, ln.t, ln.c||C.text2)); });\n  return a;\n}\n/* aspirational right-column cluster (CPU / agents / SHIELD) — tagged */\nfunction aspRight(){\n  let a=[];\n  // CPU cores meter\n  a.push(ASP(80,3,46,4,'aspirational'));\n  a.push(T(81,3,'CPU 8c/16t',C.muted));\n  for(let i=0;i<8;i++){ const busy=i<5; \n    a.push(...BAR(81+i*5,4, 4, busy?0.6+0.1*Math.sin(i):0.04, busy?C.accent:'#2A3140')); }\n  a.push(T(81,5,'~5 of 8 busy (M3)',C.muted));\n  // agents\n  a.push(ASP(80,8,46,4,'aspirational'));\n  a.push(T(81,8,'AGENTS',C.muted));\n  a.push(T(81,9,'● Device   ● Network',C.muted));\n  a.push(T(81,10,'● Filesys  ● User',C.muted));\n  // shield\n  a.push(ASP(80,13,46,3,'aspirational'));\n  a.push(T(81,13,'SHIELD: monitoring',C.warn));\n  a.push(...BAR(81,14,40,0.12,C.warn));\n  return a;\n}\n\n/* ============================ STATES ============================ */\nconst STATES={};\n\n/* 1) BOOT / INIT — ordered boot sequence revealing in the log */\nSTATES.boot={\n  name:'Boot / init', n:'01',\n  build(){ let a=[];\n    a.push(...chrome('BOOTING', C.accent));\n    a.push(...statusFieldsBoot());\n    a.push(...logBox('boot',[\n      {t:'JARVIS AI-OS v0.2.1-beta | seL4 x86-64 | PC99',c:C.accent},\n      {t:'[BOOT ] rootserver up · boot_id=1',c:C.text2},\n      {t:'[SELF ] Self-test 5/5 PASS',c:C.ok},\n      {t:'[BOOT ] untypeds=212   RAM=32 GB',c:C.text2},\n      {t:'[FB   ] 1024x768x32 type=1 @0xe0000000 UC mapped pages=768',c:C.text2},\n      {t:'[PCI  ] NVMe IDENTIFY: \"Lexar NM790 2TB\"',c:C.text2},\n      {t:'[FAT32] init OK  (part LBA 32768)',c:C.text2},\n      {t:'[MODEL] model.gguf found',c:C.text2},\n      {t:'[PB   ] Model loaded: 35 layers, 262144 vocab  (serial only)',c:C.muted},\n      {t:'[M3   ] NUM_NODES=6  (5 workers)',c:C.text2},\n      {t:'[BOOT ] frame alloc 2962 MB ...',c:C.accent},\n      {t:'_',c:C.accent,blink:true},\n    ]));\n    return a;\n  },\n  cap:{\n    title:'State 1 — Boot / init',\n    desc:'The ordered boot sequence reveals line-by-line in the log region as each stage completes — this is the LIVE serial/NVMe boot trace (the [tag] set) mirrored on screen. Status fields populate as their data arrives: Display after the id=4 FB map; Model still <code>[loading...]<\u002Fcode>; Queries/Last not yet live. <strong>GGUF/Vocab config is NOT shown<\u002Fstrong> — the dump at <code>main_x86.c:567–595<\u002Fcode> is inside the embedded self-test (<code>#ifdef JARVIS_HAS_MODEL<\u002Fcode>) and never runs on the NVMe deploy path; the only deploy-path model config is <code>[Process B] Model loaded: N layers, N vocab<\u002Fcode> (<code>inference_server.c:446–448<\u002Fcode>), serial-only, which would need PB→PA plumbing to reach the HUD.',\n    fields:[\n      ['Boot trace lines','self-test 5/5, untyped count, FB descriptor, NVMe IDENTIFY, FAT32, model.gguf found, M3 workers','LIVE'],\n      ['Self-test 5/5 PASS','LOG_SELFTEST — main_x86.c:1661','LIVE'],\n      ['FB descriptor relog','main_x86.c:1666–1675','LIVE'],\n      ['NVMe IDENTIFY string','main_x86.c:1624','LIVE'],\n      ['Banner version','main_x86.c:2387 prints v0.2.1-dev — tag is v0.2.1-beta; use -beta','LIVE'],\n      ['GGUF / Vocab config dump','embedded self-test only (#ifdef JARVIS_HAS_MODEL), OFF deploy path; real source = PB serial inference_server.c:446–448','ASP'],\n      ['Scrolling log region','new 2c-2 feature, backed by nvme_log entries','NEW'],\n    ]\n  }\n};\nfunction statusFieldsBoot(){\n  return [\n    T(2,4,'Display : 1024x768x32  @0xe0000000  BGRX',C.fg),\n    T(2,5,'Model   : Gemma 4 E2B (2962 MB)  [loading...]',C.fg),\n    T(2,6,'Threads : NUM_NODES=6  (M3 worker pool)',C.fg),\n    T(2,7,'Self-test 5/5 PASS',C.ok),\n    T(2,11,'Queries : —',C.muted),\n    T(2,12,'Last    : —',C.muted),\n  ];\n}\n\n/* 2) MODEL LOADING — NVMe-read load-% */\nSTATES.load={\n  name:'Model loading', n:'02',\n  build(){ let a=[];\n    a.push(...chrome('LOADING', C.accent));\n    a.push(...statusFieldsBoot().filter((_,i)=>i!==1)); // drop model line, redraw with %\n    a.push(T(2,5,'Model   : Gemma 4 E2B (2962 MB)  [loading 73%]',C.fg));\n    // big progress bar\n    a.push(T(2,13,'NVMe READ',C.muted));\n    a.push(...BAR(2, 14, 124, 0.73, C.accent));\n    a.push(T(2,15,'sectors 4.3M / 5.9M   · counter clamped to 100  (incl. FAT-lookup sectors)',C.muted));\n    a.push(...logBox('load',[\n      {t:'[MODEL] frame alloc 2962 MB ... done',c:C.text2},\n      {t:'[PANEL] Model   : Gemma 4 E2B (2962 MB)  [loading 41%]',c:C.muted},\n      {t:'[PANEL] Model   : Gemma 4 E2B (2962 MB)  [loading 58%]',c:C.muted},\n      {t:'[PANEL] Model   : Gemma 4 E2B (2962 MB)  [loading 73%]',c:C.accent},\n      {t:'_',c:C.accent,blink:true},\n    ].map(x=>x)));\n    return a;\n  },\n  cap:{\n    title:'State 2 — Model loading',\n    desc:'The slow phase the operator actually waits on. The Model line\\'s <code>[loading N%]<\u002Fcode> and the big bar are driven LIVE by the NVMe read counter <code>g_nvme_read_count / g_model_total_sectors<\u002Fcode> via the FAT32 read callback. The % includes FAT-lookup sectors so it is clamped to 100 (the known overshoot; 2c-2 backlog adds a data-only %). Each step mirrors to the log as a <code>[PANEL]<\u002Fcode> line.',\n    fields:[\n      ['Model [loading N%]','fb_model_pct — main_x86.c:1251–1258','LIVE'],\n      ['NVMe read counter','g_nvme_read_count via fat32_nvme_read — main_x86.c:108–124','LIVE'],\n      ['% clamp to 100','main_x86.c:1253 (FAT-lookup sectors counted)','LIVE'],\n      ['[PANEL] log mirror','fb_status_line → [PANEL] — main_x86.c:1240–1248','LIVE'],\n      ['Big progress bar','native fb_fill_rect proportional rect','NEW'],\n      ['Exact data-only %','needs fat32 progress callback — 2c-2 backlog','ASP'],\n    ]\n  }\n};\n\n/* 3) READY / IDLE */\nSTATES.ready={\n  name:'Ready / idle', n:'03',\n  build(){ let a=[];\n    a.push(...chrome('READY', C.ok));\n    a.push(...statusFields('Gemma 4 E2B (2962 MB)  [loaded]',C.ok,'q=0  err=0',C.ok,'—'));\n    a.push(...aspRight());\n    a.push(...logBox('ready',[\n      {t:'[MODEL] GGUF loaded OK',c:C.ok},\n      {t:'[BOOT ] Process B ready · model resident',c:C.text2},\n      {t:'[IPC  ] rings armed · CRC-32 on',c:C.text2},\n      {t:'[READY] awaiting workload',c:C.text2},\n      {t:'_',c:C.ok,blink:true},\n    ]));\n    a.push(T(2,43,'q=0  hits=0  infer=0  hb=0  shield=0  err=0',C.muted));\n    a.push(T(2,44,'CACHE 512 slots · ~308 patterns · <1ms lookup',C.muted));\n    return a;\n  },\n  cap:{\n    title:'State 3 — Ready / idle',\n    desc:'Model resident, workload not yet running. The six shipped panel fields (2c-1) are all live; Model flips to green <code>[loaded]<\u002Fcode> on GGUF-magic success. (The Model name + size <em>text<\u002Fem> is a hardcoded literal, <code>main_x86.c:1465<\u002Fcode> — only the loading-%/<code>[loaded]<\u002Fcode> state is live; the real on-disk size is serial-only and the real name/config lives in Process B.) The blinking <code>●<\u002Fcode>/cursor is the only motion. Right-column CPU/agents/SHIELD widgets are aspirational placeholders (see tags) — ships-now fallback: omit them, or show only the live counters strip at the bottom.',\n    fields:[\n      ['Model [loaded] (green)','main_x86.c:1836–1837','LIVE'],\n      ['Queries q=0 err=0','main_x86.c:1473','LIVE'],\n      ['Last : —','main_x86.c:1474','LIVE'],\n      ['Counters strip (all 0)','q_total/hits/infer/hb/shield/err — main_x86.c:1982–1983','LIVE'],\n      ['Cache facts','decision_cache.h (512 slots) · ~308 patterns','LIVE'],\n      ['CPU cores / agents / SHIELD meter','no live backing','ASP'],\n    ]\n  }\n};\n\n/* 4) ACTIVE — live query, cache-hit vs LLM */\nSTATES.active={\n  name:'Active query', n:'04',\n  build(){ let a=[];\n    a.push(...chrome('ACTIVE', C.live));\n    a.push(...statusFields('Gemma 4 E2B (2962 MB)  [loaded]',C.ok,'q=1842  err=0',C.ok,\n      'The capital of France is Paris.'));\n    a.push(...aspRight());\n    // route indicator: CACHE HIT vs LLM\n    a.push(R(16, 10*16, 1024-32, 18, '#0D1117', C.line));\n    a.push(T(2,10,'ROUTE   : ',C.muted));\n    a.push(T(12,10,'● CACHE HIT  <1ms',C.ok));\n    a.push(T(40,10,'/  ○ → LLM  (~5.5 tok/s)',C.muted));\n    a.push(...logBox('active',[\n      {t:'[STATS] q=1800 hits=1262 infer=270 hb=180 shield=88 err=0',c:C.text2},\n      {t:'[PANEL] Queries : q=1842  err=0',c:C.muted},\n      {t:'[INFER] \"capital of France?\" -> \"Paris.\" (M1 cyc=...)',c:C.text2},\n      {t:'[PANEL] Last    : The capital of France is Paris.',c:C.accent},\n      {t:'_',c:C.live,blink:true},\n    ]));\n    a.push(T(2,43,'q=1842  hits=1290  infer=276  hb=184  shield=92  err=0',C.fg));\n    a.push(T(2,44,'CACHE HIT 70%  ·  → LLM 15%  ·  decode ~5.5 tok/s',C.muted));\n    // tok/s tagged aspirational (on-panel live readout)\n    a.push(ASP(54,44,30,1,'aspirational'));\n    return a;\n  },\n  cap:{\n    title:'State 4 — Active query',\n    desc:'A live workload tick. The synthetic loop routes each query: ~70% resolve from the decision cache (LIVE <code>cache_lookup<\u002Fcode> hit → <code>q_hits<\u002Fcode>), ~15% escalate to the LLM (<code>q_infer<\u002Fcode>); the CACHE-HIT-vs-LLM indicator reflects that split. Last refreshes on each new inference response (~15% of queries, off the per-token path). Counters tick live. The on-panel <strong>tok/s readout is aspirational<\u002Fstrong> — decode rate is only computed offline from cycle counts in <code>LOG_INFER<\u002Fcode>; ships-now fallback: show the cache/LLM ratio + query rate (both live), not tok/s.',\n    fields:[\n      ['CACHE HIT vs → LLM','cache_lookup hit/miss — main_x86.c:2036/2048','LIVE'],\n      ['Last : <response>','captured + drawn — main_x86.c:2228–2241','LIVE'],\n      ['Queries ticking (quiet twin)','fb_status_line_quiet — main_x86.c:2360–2366','LIVE'],\n      ['Counters strip','[STATS] — main_x86.c:2314–2321','LIVE'],\n      ['70/15/10/5 mix','workload slots — main_x86.c:2010–2012','LIVE'],\n      ['Live tok/s on panel','only offline via LOG_INFER M1 — jarvis_debug.h:39–42','ASP'],\n      ['Per-token streaming','PB sends final answer, not a token stream','ASP'],\n    ]\n  }\n};\n\n/* 5) ERROR — err>0 */\nSTATES.error={\n  name:'Error', n:'05',\n  build(){ let a=[];\n    a.push(...chrome('ERROR', C.err));\n    a.push(...statusFields('Gemma 4 E2B (2962 MB)  [loaded]',C.ok,'q=2403  err=7',C.err,\n      'The capital of France is Paris.'));\n    a.push(...aspRight());\n    a.push(R(16, 10*16, 1024-32, 18, '#150C0C', C.err));\n    a.push(T(2,10,'ALERT   : ',C.err));\n    a.push(T(12,10,'inference timeout — PB did not respond (5M polls)',C.err));\n    a.push(...logBox('error',[\n      {t:'[STATS] q=2400 hits=1680 infer=360 hb=240 shield=119 err=7',c:C.text2},\n      {t:'[PA   ] TIMEOUT: PB did not respond after 5M polls',c:C.err},\n      {t:'[ERR  ] empty inference response',c:C.err},\n      {t:'[PANEL] Queries : q=2403  err=7',c:C.err},\n      {t:'_',c:C.err,blink:true},\n    ]));\n    a.push(T(2,43,'q=2403  hits=1682  infer=361  hb=241  shield=119  err=7',C.err));\n    a.push(T(2,44,'err breakdown: 5 cache-miss · 2 infer-timeout   (from [STATS])',C.muted));\n    return a;\n  },\n  cap:{\n    title:'State 5 — Error',\n    desc:'When <code>q_errors &gt; 0<\u002Fcode> the Queries line flips to red LIVE (the quiet twin passes <code>q_errors ? FBP_ERR : FBP_OK<\u002Fcode>), and the counters strip shows the breakdown. Error sources are real and enumerable: unexpected cache miss, empty inference response, inference timeout (the 5M-poll guard), heartbeat/shield timeouts. The alert band surfaces the latest [ERR]/[PA] log line.',\n    fields:[\n      ['Queries red on err>0','q_errors ? FBP_ERR : FBP_OK — main_x86.c:2366','LIVE'],\n      ['[STATS] breakdown','main_x86.c:2314–2321','LIVE'],\n      ['Inference timeout','5M-poll guard — main_x86.c:2161–2169','LIVE'],\n      ['Empty response / cache-miss err','main_x86.c:2049 / 2246','LIVE'],\n      ['Alert band (latest error)','new 2c-2 field, backed by LOG_ERROR entries','NEW'],\n      ['Per-error-type counters','aggregate err only today; per-type needs new counters','ASP'],\n    ]\n  }\n};\n\nconst ORDER=['boot','load','ready','active','error'];\n\n/* ---- render a frame ---- */\nfunction renderFrame(key){\n  const fb=document.getElementById('fb'); fb.innerHTML='';\n  const specs=STATES[key].build();\n  for(const s of specs){\n    if(s.t==='ln'){\n      const d=document.createElement('div'); d.className='ln'+(s.blink?' blink':'');\n      d.style.left=s.x+'px'; d.style.top=s.y+'px'; d.style.color=s.color;\n      d.textContent=s.text; if(s.blink){d.classList.add('blink');}\n      fb.appendChild(d);\n    } else if(s.t==='px'){\n      const d=document.createElement('div'); d.className='px';\n      d.style.left=s.x+'px'; d.style.top=s.y+'px'; d.style.width=s.w+'px'; d.style.height=s.h+'px';\n      if(s.fill&&s.fill!=='transparent') d.style.background=s.fill;\n      if(s.border) d.style.boxShadow='inset 0 0 0 1px '+s.border;\n      fb.appendChild(d);\n    } else if(s.t==='asp'){\n      const d=document.createElement('div'); d.className='asp';\n      d.style.left=s.x+'px'; d.style.top=s.y+'px'; d.style.width=s.w+'px'; d.style.height=s.h+'px';\n      fb.appendChild(d);\n      const tg=document.createElement('div'); tg.className='asptag';\n      tg.style.left=s.x+'px'; tg.style.top=(s.y-12)+'px'; tg.textContent=s.tag;\n      fb.appendChild(tg);\n    }\n  }\n  // mark blink lines (textContent '_' already styled)\n  fb.querySelectorAll('.ln').forEach(el=>{ if(el.textContent==='_') el.classList.add('blink'); });\n  renderCap(key);\n  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.k===key));\n}\n\nfunction renderCap(key){\n  const c=STATES[key].cap, el=document.getElementById('cap');\n  let rows=c.fields.map(f=>{\n    const cls=f[2]==='LIVE'?'b-live':f[2]==='ASP'?'b-asp':'b-new';\n    const lab=f[2]==='ASP'?'ASPIRATIONAL':f[2];\n    return `<div class=\"row\"><div class=\"k\">${f[0]}<\u002Fdiv><div class=\"v\">${f[1]}<\u002Fdiv><div class=\"badge ${cls}\">${lab}<\u002Fdiv><\u002Fdiv>`;\n  }).join('');\n  el.innerHTML=`<h3>${c.title}<\u002Fh3><p>${c.desc}<\u002Fp>\n    <div class=\"legend\">\n      <span><i class=\"dot\" style=\"background:${C.ok}\"><\u002Fi>ok / loaded / pass<\u002Fspan>\n      <span><i class=\"dot\" style=\"background:${C.accent}\"><\u002Fi>accent · in-progress<\u002Fspan>\n      <span><i class=\"dot\" style=\"background:${C.live}\"><\u002Fi>live / streaming<\u002Fspan>\n      <span><i class=\"dot\" style=\"background:${C.warn}\"><\u002Fi>aspirational widget<\u002Fspan>\n      <span><i class=\"dot\" style=\"background:${C.err}\"><\u002Fi>error<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"fieldlist\"><div class=\"row\"><div class=\"k\" style=\"color:var(--muted)\">Field<\u002Fdiv><div class=\"v\" style=\"color:var(--muted)\">Backing / note<\u002Fdiv><div class=\"badge\" style=\"color:var(--muted)\">Tag<\u002Fdiv><\u002Fdiv>${rows}<\u002Fdiv>`;\n}\n\n/* ---- tabs ---- */\nconst tabs=document.getElementById('tabs');\nORDER.forEach(k=>{\n  const b=document.createElement('button'); b.className='tab'; b.dataset.k=k;\n  b.innerHTML=`<span class=\"n\">${STATES[k].n}<\u002Fspan> ${STATES[k].name}`;\n  b.onclick=()=>renderFrame(k); tabs.appendChild(b);\n});\n\n/* ---- scale frame to fit ---- */\nfunction fit(){\n  const scaler=document.getElementById('scaler');\n  const avail=Math.min(1024, scaler.parentElement.clientWidth);\n  const s=avail/1024; scaler.style.transform='scale('+s+')';\n  scaler.style.height=(768*s)+'px';\n}\nwindow.addEventListener('resize',fit);\n\n/* ---- matrices / tokens / lists data ---- */\nconst MATA=[\n  ['Title banner \"JARVIS AI-OS Phase 4 / goal #2\"','main_x86.c:1455','all states (header)'],\n  ['Display 1024x768x32 @0xe0000000 BGRX','main_x86.c:1458–1463','all (after FB map)'],\n  ['FB descriptor + UC map pages','main_x86.c:1666–1675','Boot log'],\n  ['Self-test 5/5 PASS','main_x86.c:1661 (LOG_SELFTEST)','Boot, Ready'],\n  ['Untyped count / RAM','main_x86.c:914 · 2392','Boot log'],\n  ['NVMe IDENTIFY \"Lexar NM790 2TB\"','main_x86.c:1624','Boot log'],\n  ['FAT32 init OK','main_x86.c:1729','Boot log'],\n  ['Model config: layers, vocab (deploy path)','inference_server.c:446–448 (Process B, serial)','NOT PLACED — serial-only; the GGUF/Vocab dump (main_x86.c:567–595) is embedded-self-test only (#ifdef JARVIS_HAS_MODEL), off the deploy path. HUD needs PB→PA plumbing.'],\n  ['Model name + 2962 MB','main_x86.c:1256/1465 (hardcoded)','all (Model field)'],\n  ['Model load % (NVMe read)','main_x86.c:108–124 · 1251–1258','Model loading'],\n  ['Model [loaded] green','main_x86.c:1836–1837','Ready, Active, Error'],\n  ['Threads NUM_NODES=6','main_x86.c:1468–1470 (g_num_nodes:174)','all (Threads field)'],\n  ['q_total / hits / infer / hb / shield / err','main_x86.c:1982–1983, 2314–2321','Active, Error (counters)'],\n  ['Queries q= err= (panel, quiet twin)','main_x86.c:2360–2366','Ready, Active, Error'],\n  ['Cache hit vs miss (per query)','main_x86.c:2036 / 2048','Active (ROUTE)'],\n  ['Last inference response','main_x86.c:2228–2241','Active, Error'],\n  ['[PANEL] log mirror','main_x86.c:1240–1248','Loading, Active, Error (log)'],\n  ['[STATS] line / NVMe stats','main_x86.c:2314–2352','Active, Error (log)'],\n  ['boot_id','nvme_log.h (header) · nvme_log_boot_id()','Boot log'],\n  ['Decision cache 512 slots','decision_cache.h:18','Ready (cache facts)'],\n  ['SHIELD result = ALLOW (runtime)','inference_server.c:668–671','— (shown as \"monitoring\", not a meter)'],\n  ['shield_check keyword blocklist','main_x86.c:298–313 (boot self-test only)','NOT PLACED (serial-only self-test; would mislead as live gating)'],\n  ['tok/s (offline, M1)','jarvis_debug.h:39–42 · inference_server.c:312','NOT PLACED live (offline only; aspirational on panel)'],\n];\nconst MATB=[\n  ['Header banner + state badge','LIVE','main_x86.c:1455 + state from model/err flags'],\n  ['Display / Threads fields','LIVE','main_x86.c:1458–1471'],\n  ['Self-test 5/5','LIVE','main_x86.c:1661'],\n  ['Model field + % + [loaded]','LIVE','main_x86.c:1251–1258, 1836'],\n  ['NVMe read progress bar','NEW','native fb_fill_rect over the live counter (108–124)'],\n  ['Event-log region (scrolling)','NEW','2c-2 feature; renders nvme_log/[PANEL]/[STATS] entries'],\n  ['Queries field + counters strip','LIVE','main_x86.c:2314–2366'],\n  ['ROUTE: CACHE HIT vs → LLM','LIVE','cache_lookup result, 2036/2048 (badge is new chrome)'],\n  ['Last response','LIVE','main_x86.c:2228–2241'],\n  ['Alert band (latest error)','NEW','backed by LOG_ERROR / [PA] timeout lines'],\n  ['CPU 8-core meter','ASPIRATIONAL','needs: per-core utilisation sampling (no live source). Fallback: omit.'],\n  ['Per-agent Device/Network/Filesystem/User','ASPIRATIONAL','needs: live agent dispatch state (agents are a Phase-1 design, not in the bare-metal loop). Fallback: omit.'],\n  ['SHIELD risk meter','ASPIRATIONAL','needs: model-assisted SHIELD scoring (runtime echoes ALLOW). Fallback: a static \"SHIELD: monitoring\" label, no meter.'],\n  ['Live tok/s readout','ASPIRATIONAL','needs: on-device TSC bracketing + divide (only offline today). Fallback: cache/LLM ratio + query rate.'],\n  ['Uptime / wall clock','ASPIRATIONAL','needs: a timer tick surfaced to the panel (TSC→ms exists for logs, not displayed). Fallback: boot_id + query count.'],\n  ['Per-token streaming cursor','ASPIRATIONAL','PB returns the final answer, not a token stream (inference_server.c). Fallback: show Last on completion.'],\n  ['GGUF / Vocab config on panel','ASPIRATIONAL','embedded self-test only (#ifdef JARVIS_HAS_MODEL); deploy source is PB serial (inference_server.c:446–448) — needs PB→PA plumbing. Fallback: drop the fields.'],\n  ['IPC queue-depth / busy indicator','ASPIRATIONAL','derivable live from the ring header (write_idx − read_idx; pb_can_log reads it, inference_server.c:85–87) but never published — needs the header surfaced. A genuine live busy signal, unlike per-core meters.'],\n];\nconst PAL=[\n  ['FBP_BG canvas','0x0A0B0E'],['FBP_FG text','0xC8D0E0'],['FBP_ACCENT','0x4F7CFF'],\n  ['FBP_OK','0x3FB950'],['FBP_ERR','0xF2564B'],['JCLR_WARN','0xD6A02A'],\n  ['JCLR_LIVE cyan','0x46C7C7'],['JCLR_MUTED','0x6B7589'],['text secondary','0x98A2B6'],\n  ['surface/card','0x12151B'],['inset/hover','0x1D222C'],['hairline','0x272D39'],\n];\nconst SHIP=[\n  'Fixed status panel — Title / Display / Model / Threads / Self-test / Queries / Last (8×16 bitmap text, drawn once, updated in place).',\n  'Model [loading N%] + a proportional NVMe-read progress bar (native fill_rect).',\n  'Live counters strip q/hits/infer/hb/shield/err, green→red on first error.',\n  'CACHE-HIT vs → LLM route indicator (live cache_lookup result).',\n  'Last-response line, refreshed per inference.',\n  'Scrolling event-log region rendering nvme_log / [PANEL] / [STATS] entries.',\n  'Boot sequence reveal (the ordered [tag] trace).',\n  'Static \"SHIELD: monitoring\" label (honest; no meter).',\n];\nconst ASPL=[\n  'Per-core CPU meters (8c/16t) — no live per-core source.',\n  'Per-agent Device/Network/Filesystem/User status — agents are a Phase-1 design, absent from the bare-metal loop.',\n  'SHIELD risk meter / blocked-action gating — runtime SHIELD echoes ALLOW.',\n  'Live on-panel tok/s — only computed offline from LOG_INFER cycle counts.',\n  'Uptime / wall clock — TSC→ms exists for logs, not surfaced to the panel.',\n  'Per-token streaming + blinking generate cursor — PB returns the final answer only.',\n  'Real conversational input — the query stream is synthetic; USB-HID input is future.',\n  '16×32 2× headings, true WriteCombining (faster fills) — 2c-2 / perf backlog.',\n  'Model config (layers / vocab / dim) on the HUD — emitted only by the embedded self-test (off deploy path) or Process B serial (inference_server.c:446–448); needs PB→PA plumbing.',\n  'IPC queue-depth / busy — derivable from the shared-ring header (write_idx − read_idx) but never published.',\n];\nconst GAPA=[\n  ['Arc-reactor cyan #22d3ee accent, 1280×720','Shipped code is #4F7CFF electric blue at 1024×768 (FBP_ACCENT; box GOP mode).'],\n  ['Per-core CPU activity meters','No per-core sampling in the loop — aspirational.'],\n  ['Per-agent Device/Network/Filesystem/User panel','Agents live only in the Phase-1 Python design; the bare-metal loop has no agent dispatch.'],\n  ['SHIELD risk meter (▁▂▃)','Runtime SHIELD returns ALLOW (inference_server.c:668–671); keyword check is a boot self-test only.'],\n  ['Streaming tokens into a response area','PB sends the final response; no per-token stream to screen.'],\n  ['Uptime + running wall clock in the top bar','Not surfaced; TSC→ms is a log timestamp (2c-2), not a panel field.'],\n  ['Live \"5.2 tok/s\" readout','Decode rate is offline-only (M1, from LOG_INFER) — not on the panel.'],\n];\nconst GAPB=[\n  ['Model config: layers, vocab (Process B load)','inference_server.c:446–448 (serial-only)'],\n  ['FB descriptor + UC-mapped page count','main_x86.c:1666–1675'],\n  ['Untyped count + RAM at boot','main_x86.c:914 · 2392'],\n  ['NVMe IDENTIFY model string','main_x86.c:1624'],\n  ['boot_id (per-boot log key)','nvme_log.h · nvme_log_boot_id()'],\n  ['hb / shield counters (not just q/err)','main_x86.c:2318–2319'],\n  ['The [PANEL] log-mirror line itself','main_x86.c:1240–1248'],\n  ['Model load % clamp + FAT-lookup overshoot','main_x86.c:1251–1258'],\n];\n\n/* fill */\nfunction fill(){\n  document.getElementById('matA').innerHTML=MATA.map(r=>`<tr><td>${r[0]}<\u002Ftd><td class=\"cite\">${r[1]}<\u002Ftd><td>${r[2]}<\u002Ftd><\u002Ftr>`).join('');\n  document.getElementById('matB').innerHTML=MATB.map(r=>{\n    const cls=r[1]==='LIVE'?'live':r[1]==='ASPIRATIONAL'?'asp':'new';\n    return `<tr><td>${r[0]}<\u002Ftd><td><span class=\"tg ${cls}\">${r[1]}<\u002Fspan><\u002Ftd><td>${r[2]}<\u002Ftd><\u002Ftr>`;}).join('');\n  document.getElementById('pal').innerHTML=PAL.map(p=>`<div class=\"sw\"><span class=\"chip\" style=\"background:#${p[1].slice(2)}\"><\u002Fspan><div><div class=\"nm\">${p[0]}<\u002Fdiv><div class=\"hx\">${p[1]}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`).join('');\n  document.getElementById('ship').innerHTML=SHIP.map(s=>`<li>${s}<\u002Fli>`).join('');\n  document.getElementById('aspl').innerHTML=ASPL.map(s=>`<li>${s}<\u002Fli>`).join('');\n  document.getElementById('gapA').innerHTML=GAPA.map(r=>`<tr><td>${r[0]}<\u002Ftd><td>${r[1]}<\u002Ftd><\u002Ftr>`).join('');\n  document.getElementById('gapB').innerHTML=GAPB.map(r=>`<tr><td>${r[0]}<\u002Ftd><td class=\"cite\">${r[1]}<\u002Ftd><\u002Ftr>`).join('');\n}\n\nfill(); renderFrame('boot'); fit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
