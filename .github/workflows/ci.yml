name: JARVIS AI-OS Test Suite

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: pip install pyserial psutil

    # =====================================================================
    # Phase 1 C tests
    # =====================================================================

    - name: "Phase 1: Ring Buffer IPC (C)"
      run: |
        cd phase1/src/ipc
        gcc -Wall -Wextra -O2 -std=c11 -pthread \
          test_ipc.c ring_buffer.c \
          -o test_ipc -lrt -pthread
        ./test_ipc

    - name: "Phase 1: Decision Cache (C)"
      run: |
        cd phase1/src/cache
        gcc -Wall -Wextra -O2 -std=c11 \
          test_cache.c decision_cache.c cache_patterns.c \
          -o test_cache -lrt
        ./test_cache

    - name: "Phase 1: Driver Registry (C)"
      run: |
        cd phase1/src/drivers
        gcc -Wall -O2 -std=c11 -pthread \
          test_driver_registry.c driver_registry.c \
          -o test_driver_registry -pthread
        ./test_driver_registry

    - name: "Phase 1: VirtIO Block Driver (C)"
      run: |
        cd phase1/src/drivers
        gcc -O2 -std=c11 -D_GNU_SOURCE \
          test_virtio_blk.c virtio_blk.c virtio_core.c driver_registry.c \
          -o test_virtio_blk -lpthread
        ./test_virtio_blk

    # =====================================================================
    # Phase 2 C tests
    # =====================================================================

    - name: "Phase 2: Dual Ring Buffer (C)"
      run: |
        cd phase2/src/ipc
        gcc -O2 -I../../../phase1/src/cache -I../../../phase1/src/ipc \
          dual_ring_buffer.c test_dual_ring.c ../../../phase1/src/ipc/ring_buffer.c \
          -o test_dual_ring
        ./test_dual_ring

    - name: "Phase 2: IPC Handler (C)"
      run: |
        cd phase2/src/ipc
        gcc -O2 -I../../../phase1/src/cache -I../../../phase1/src/ipc \
          ipc_handler.c dual_ring_buffer.c ../../../phase1/src/ipc/ring_buffer.c \
          ../../../phase1/src/cache/decision_cache.c ../../../phase1/src/cache/cache_patterns.c \
          test_ipc_handler.c -o test_ipc_handler
        ./test_ipc_handler

    - name: "Phase 2: UART Logic (C)"
      run: |
        cd phase2/src/drivers
        gcc -O2 test_uart_logic.c -o test_uart_logic
        ./test_uart_logic

    # =====================================================================
    # Phase 2 Python tests
    # =====================================================================

    - name: "Phase 2: UART IPC Client (Python)"
      run: python3 phase2/src/ai/test_uart_ipc_client.py

    - name: "Phase 2: System Bootstrap (Python)"
      run: python3 phase2/src/ai/test_system_bootstrap.py

    - name: "Phase 2: Integration (Python)"
      run: python3 phase2/src/ai/test_integration.py

    # =====================================================================
    # Phase 3 C tests
    # =====================================================================

    - name: "Phase 3: GGUF Parser (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          phase3/src/ai/test_gguf_parser.c phase3/src/ai/gguf_parser.c \
          -I phase3/src/ai -o /tmp/test_gguf
        /tmp/test_gguf

    - name: "Phase 3: GGUF-to-ggml Loading (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          phase3/src/ai/test_gguf_to_ggml.c phase3/src/ai/gguf_parser.c \
          -I phase3/src/ai -lm -o /tmp/test_gguf_load
        /tmp/test_gguf_load

    - name: "Phase 3: Shared Memory IPC (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_GNU_SOURCE \
          phase3/src/ipc/test_shmem_ipc.c phase3/src/ipc/shmem_ipc.c \
          -I phase3/src/ipc -o /tmp/test_shmem
        /tmp/test_shmem

    - name: "Phase 3: UART 16550 (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_uart_16550.c phase3/src/drivers/uart_16550.c \
          -o /tmp/test_uart_16550
        /tmp/test_uart_16550

    - name: "Phase 3: PCI Enumeration (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_pci.c phase3/src/drivers/pci.c \
          -o /tmp/test_pci
        /tmp/test_pci

    - name: "Phase 3: AHCI Discovery (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_ahci.c phase3/src/drivers/ahci.c \
          -o /tmp/test_ahci
        /tmp/test_ahci

    - name: "Phase 3: Net Stack (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_net_stack.c phase3/src/drivers/net_stack.c \
          -o /tmp/test_net_stack
        /tmp/test_net_stack

    - name: "Phase 3: Net Cmd (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_net_cmd.c phase3/src/drivers/net_cmd.c \
          phase3/src/drivers/net_stack.c \
          -o /tmp/test_net_cmd
        /tmp/test_net_cmd

    - name: "Phase 3: AHCI I/O (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_ahci_io.c phase3/src/drivers/ahci.c \
          -o /tmp/test_ahci_io
        /tmp/test_ahci_io

    - name: "Phase 3: NIC RTL8168 (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_nic.c phase3/src/drivers/nic_rtl8168.c \
          phase3/src/drivers/pci.c \
          -o /tmp/test_nic
        /tmp/test_nic

    - name: "Phase 3: x86 Timer (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_x86_timer.c phase3/src/drivers/x86_timer.c \
          -o /tmp/test_x86_timer
        /tmp/test_x86_timer

    - name: "Phase 3: Block Device (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_blk_dev.c phase3/src/drivers/blk_dev_x86.c \
          phase3/src/drivers/ahci.c \
          -o /tmp/test_blk_dev
        /tmp/test_blk_dev

    - name: "Phase 3: VGA Text Mode (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -DJARVIS_TEST_MOCK \
          -I phase3/src/drivers \
          phase3/src/drivers/test_vga_text.c phase3/src/drivers/vga_text.c \
          -o /tmp/test_vga_text
        /tmp/test_vga_text

    - name: "Phase 3: Tensor Ops (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 \
          phase3/src/ai/test_tensor_ops.c phase3/src/ai/tensor_ops.c \
          -I phase3/src/ai -lm -o /tmp/test_tensor_ops
        /tmp/test_tensor_ops

    - name: "Phase 3: Dequantization (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 \
          phase3/src/ai/test_dequant.c phase3/src/ai/dequant.c \
          -I phase3/src/ai -lm -o /tmp/test_dequant
        /tmp/test_dequant

    - name: "Phase 3: BPE Tokenizer (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 \
          phase3/src/ai/test_tokenizer.c phase3/src/ai/tokenizer.c \
          -I phase3/src/ai -lm -o /tmp/test_tokenizer
        /tmp/test_tokenizer

    - name: "Phase 3: Llama Model Loading (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_llama_load.c phase3/src/ai/llama_load.c \
          phase3/src/ai/dequant.c phase3/src/ai/gguf_parser.c \
          -lm -o /tmp/test_llama_load
        /tmp/test_llama_load

    - name: "Phase 3: Sampling (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 \
          phase3/src/ai/test_sampling.c phase3/src/ai/sampling.c \
          -I phase3/src/ai -lm -o /tmp/test_sampling
        /tmp/test_sampling

    - name: "Phase 3: Llama Forward Pass (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_llama_forward.c \
          phase3/src/ai/llama_forward.c \
          phase3/src/ai/llama_load.c \
          phase3/src/ai/tensor_ops.c \
          phase3/src/ai/sampling.c \
          phase3/src/ai/dequant.c \
          phase3/src/ai/gguf_parser.c \
          -lm -o /tmp/test_llama_forward
        /tmp/test_llama_forward

    - name: "Phase 3: Inference API (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_inference.c \
          phase3/src/ai/inference.c \
          phase3/src/ai/llama_forward.c \
          phase3/src/ai/llama_load.c \
          phase3/src/ai/tensor_ops.c \
          phase3/src/ai/sampling.c \
          phase3/src/ai/dequant.c \
          phase3/src/ai/tokenizer.c \
          phase3/src/ai/gguf_parser.c \
          phase3/src/ai/gguf_vocab.c \
          -lm -o /tmp/test_inference
        /tmp/test_inference

    - name: "Phase 3: Q4_K/Q6_K Dequantization (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_dequant_kq.c phase3/src/ai/dequant.c \
          -lm -o /tmp/test_dequant_kq
        /tmp/test_dequant_kq

    - name: "Phase 3: GGUF Memory API (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_gguf_memory.c phase3/src/ai/gguf_parser.c \
          -lm -o /tmp/test_gguf_memory
        /tmp/test_gguf_memory

    - name: "Phase 3: GGUF Vocab Extraction (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_gguf_vocab.c phase3/src/ai/gguf_vocab.c \
          phase3/src/ai/gguf_parser.c phase3/src/ai/tokenizer.c \
          -lm -o /tmp/test_gguf_vocab
        /tmp/test_gguf_vocab

    - name: "Phase 3: F32 vs Quantized Forward Compare (C)"
      run: |
        gcc -Wall -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_forward_compare.c phase3/src/ai/llama_quant.c \
          phase3/src/ai/llama_forward.c phase3/src/ai/llama_load.c \
          phase3/src/ai/tensor_ops.c phase3/src/ai/dequant.c \
          phase3/src/ai/sampling.c phase3/src/ai/gguf_parser.c \
          phase3/src/ai/tokenizer.c \
          -lm -o /tmp/test_forward_compare
        /tmp/test_forward_compare

    - name: "Phase 3: Quantized Model (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_llama_quant.c phase3/src/ai/llama_quant.c \
          phase3/src/ai/llama_load.c phase3/src/ai/llama_forward.c \
          phase3/src/ai/tensor_ops.c phase3/src/ai/dequant.c \
          phase3/src/ai/sampling.c phase3/src/ai/gguf_parser.c \
          -lm -o /tmp/test_llama_quant
        /tmp/test_llama_quant

    - name: "Phase 3: Shared Memory IPC CRC (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_GNU_SOURCE \
          phase3/src/ipc/test_shmem_crc.c phase3/src/ipc/shmem_ipc.c \
          -I phase3/src/ipc -o /tmp/test_shmem_crc
        /tmp/test_shmem_crc

    - name: "Phase 3: SHIELD Safety (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_shield.c phase3/src/ai/shield.c \
          phase3/src/ai/tokenizer.c \
          -lm -o /tmp/test_shield
        /tmp/test_shield

    - name: "Phase 3: Model Scaling State Machine (C)"
      run: |
        gcc -Wall -Werror -O2 -std=c11 \
          -I phase3/src/ai \
          phase3/src/ai/test_model_scaling.c phase3/src/ai/model_scaling.c \
          -lm -o /tmp/test_model_scaling
        /tmp/test_model_scaling

    - name: "Phase 3: Generation Quality (C)"
      run: |
        gcc -Wall -O2 -std=c11 -D_POSIX_C_SOURCE=200809L \
          -I phase3/src/ai \
          phase3/src/ai/test_generation.c phase3/src/ai/llama_forward.c \
          phase3/src/ai/llama_load.c phase3/src/ai/tensor_ops.c \
          phase3/src/ai/dequant.c phase3/src/ai/sampling.c \
          phase3/src/ai/gguf_parser.c phase3/src/ai/tokenizer.c \
          phase3/src/ai/gguf_vocab.c \
          -lm -o /tmp/test_generation
        /tmp/test_generation
